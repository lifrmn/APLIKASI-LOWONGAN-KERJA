# =====================================================
# File: deploy/nginx/cloudflare-real-ip.conf
# Fungsi:
#   Percayai header `CF-Connecting-IP` HANYA dari IP range milik
#   Cloudflare — sehingga $remote_addr menjadi IP klien asli
#   (bukan IP proxy CF). Ini penting untuk:
#     - Nginx `limit_req` per-IP
#     - App rate limit (Nest Throttler) via X-Forwarded-For
#     - Audit log & login history
#
#   Cara pakai:
#     1. Include file ini dari `http { }` di nginx.conf:
#          include /etc/nginx/conf.d/cloudflare-real-ip.conf;
#     2. Update IP range secara berkala (Cloudflare bisa berubah):
#          curl -sSf https://www.cloudflare.com/ips-v4/
#          curl -sSf https://www.cloudflare.com/ips-v6/
#        Atau otomatis via cron script di deploy/scripts/update-cf-ips.sh
#
#   Aturan CF-only:
#     - Kalau backend menerima request dari IP di LUAR daftar ini,
#       $remote_addr tetap IP klien asli.
#     - Firewall (ufw/iptables) SEBAIKNYA hanya izinkan port 80/443
#       dari Cloudflare IPs → memaksa semua traffic lewat CF WAF.
# =====================================================

# ----- IPv4 Cloudflare (per 2026) -----
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# ----- IPv6 Cloudflare -----
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Gunakan header CF, dan lewati SETIAP hop dalam X-Forwarded-For
# sampai ketemu IP di luar daftar `set_real_ip_from` (yaitu klien asli).
real_ip_header CF-Connecting-IP;
real_ip_recursive on;
