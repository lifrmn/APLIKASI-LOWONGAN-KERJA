# =====================================================
# File: deploy/nginx/api.conf
# Fungsi: Reverse proxy api.domain.com → backend NestJS.
#         Aktifkan HTTPS, WebSocket (chat), security headers,
#         dan rate limit umum.
#
# Ganti `api.example.com` dengan domain Anda.
# Certificate disediakan oleh certbot di host:
#   /etc/letsencrypt/live/api.example.com/{fullchain,privkey}.pem
# =====================================================

# --- HTTP: redirect ke HTTPS + ACME challenge ---
server {
    listen 80;
    server_name api.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: reverse proxy ---
server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # ----------- Security headers -----------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ----------- Rate limit -----------
    limit_req zone=api_limit burst=40 nodelay;
    limit_conn conn_limit 50;

    # ----------- Upload size -----------
    client_max_body_size 10M;

    # ----------- Proxy ke backend NestJS -----------
    location / {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ----------- WebSocket (chat) -----------
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # Tolak akses ke file tersembunyi
    location ~ /\.(?!well-known) {
        deny all;
    }
}
