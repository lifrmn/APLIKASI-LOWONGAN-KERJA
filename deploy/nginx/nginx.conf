# =====================================================
# File: deploy/nginx/nginx.conf
# Fungsi: Main config Nginx reverse-proxy.
#         Memuat conf.d/* (api.conf & admin.conf) untuk
#         masing-masing subdomain.
# =====================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------- Logging -----------
    log_format main_ext '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time';
    access_log /var/log/nginx/access.log main_ext;

    # ----------- Tuning -----------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    types_hash_max_size 2048;

    # Batas ukuran request (upload): selaras dengan backend
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ----------- Gzip -----------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml application/wasm;

    # ----------- Rate limit zone (di-share antar server block) -----------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ----------- Health untuk docker compose healthcheck -----------
    server {
        listen 80 default_server;
        server_name _;
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        # ACME HTTP-01 challenge (certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 444; # tutup koneksi untuk host tak dikenal
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
