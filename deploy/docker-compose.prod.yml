# =====================================================
# File: deploy/docker-compose.prod.yml
# Fungsi: Topologi production lengkap di VPS:
#  - postgres   : PostgreSQL 16 (internal only)
#  - redis      : Redis 7 (internal only)
#  - backend    : NestJS API (internal only, di-proxy oleh nginx)
#  - admin      : Admin React build di Nginx static (internal only)
#  - nginx      : Reverse proxy publik 80/443 + TLS
#
# Hanya nginx yang publik. Postgres/redis/backend/admin tidak
# meng-expose port ke host — diakses lewat network internal.
#
# Cara pakai (ringkas):
#   cp deploy/.env.production.example .env.production
#   # isi kredensial
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env.production up -d --build
# =====================================================

name: bursa-kerja

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: bursa-kerja/backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      APP_URL: ${APP_URL}
      APP_GLOBAL_PREFIX: api
      APP_API_VERSION: v1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      THROTTLE_TTL: ${THROTTLE_TTL}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_FILE_SIZE_MB: ${UPLOAD_MAX_FILE_SIZE_MB}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}
      SWAGGER_PATH: docs
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
    # Tidak ada ports publik — diproxy oleh nginx.

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    image: bursa-kerja/admin:latest
    restart: unless-stopped
    networks:
      - internal
    # Internal saja; nginx upstream akan proxy ke port 80 container ini.

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - admin
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/api.conf:/etc/nginx/conf.d/api.conf:ro
      - ./nginx/admin.conf:/etc/nginx/conf.d/admin.conf:ro
      # Certbot certs di host
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/healthz']
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
