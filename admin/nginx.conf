# =====================================================
# File: admin/nginx.conf
# Fungsi: Konfigurasi Nginx internal pada container admin.
#         SPA fallback ke index.html, gzip, cache asset statis.
# =====================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip untuk asset teks
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache panjang untuk asset ber-hash (Vite menambahkan hash di nama file)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: route tidak dikenal kembalikan index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Health untuk reverse-proxy
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
