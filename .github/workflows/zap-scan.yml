name: zap-scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL API target (mis. staging). Kosongkan untuk pakai self-hosted.'
        required: false
        default: ''
  schedule:
    - cron: '0 4 * * 0'  # Minggu 04:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  # -----------------------------------------------------
  # ZAP Baseline scan terhadap API self-hosted (spin-up
  # backend + Postgres in-runner) atau URL eksternal.
  # -----------------------------------------------------
  zap-baseline:
    name: ZAP Baseline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bursa_kerja
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install & prepare backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bursa_kerja?schema=public
        run: |
          npm ci --ignore-scripts
          npx prisma generate
          npx prisma db push --accept-data-loss
          npm run prisma:seed || true

      - name: Start backend
        working-directory: backend
        env:
          NODE_ENV: development
          APP_PORT: 3000
          APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bursa_kerja?schema=public
          JWT_ACCESS_SECRET: ci_access_secret_minimal_32_karakter_ci
          JWT_REFRESH_SECRET: ci_refresh_secret_minimal_32_karakter_ci
          BCRYPT_SALT_ROUNDS: 10
          CORS_ORIGINS: 'http://localhost:5173'
          SWAGGER_ENABLED: 'true'
        run: |
          nohup npm run start:dev > /tmp/nest.log 2>&1 &
          echo $! > /tmp/nest.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/v1/health > /dev/null; then
              echo "Backend ready"; exit 0
            fi
            sleep 2
          done
          echo "Backend gagal boot"; tail -80 /tmp/nest.log; exit 1

      - name: Resolve target URL
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "url=${{ github.event.inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=http://localhost:3000/api/v1" >> $GITHUB_OUTPUT
          fi

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: .github/zap/rules.tsv
          cmd_options: '-a -j -T 15'
          allow_issue_writing: true
          fail_action: false

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/nest.pid) 2>/dev/null || true
