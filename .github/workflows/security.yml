name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # Senin 03:00 UTC — audit mingguan
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # -----------------------------------------------------
  # 1. npm audit — backend & admin
  # -----------------------------------------------------
  npm-audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [backend, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install deps
        working-directory: ${{ matrix.dir }}
        run: npm ci --ignore-scripts

      - name: Run npm audit (high & above → fail)
        working-directory: ${{ matrix.dir }}
        run: npm audit --omit=dev --audit-level=high

      - name: Full audit report (informational)
        if: always()
        working-directory: ${{ matrix.dir }}
        run: npm audit --json > npm-audit.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.dir }}
          path: ${{ matrix.dir }}/npm-audit.json
          retention-days: 30

  # -----------------------------------------------------
  # 2. gitleaks — deteksi secret di seluruh histori
  # -----------------------------------------------------
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # -----------------------------------------------------
  # 3. CodeQL — SAST untuk TS/JS
  # -----------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  # -----------------------------------------------------
  # 4. Trivy — scan container image backend
  # -----------------------------------------------------
  trivy:
    name: trivy (Docker image scan)
    runs-on: ubuntu-latest
    needs: [npm-audit]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t sulbar/backend:ci backend
      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: sulbar/backend:ci
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
