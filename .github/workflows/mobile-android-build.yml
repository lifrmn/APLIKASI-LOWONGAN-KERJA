name: mobile-android-build

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (opsional)'
        required: false
        default: ''
  push:
    tags:
      - 'mobile-v*'   # tag mobile-v1.0.0 -> trigger build .aab

jobs:
  build-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret kosong — build akan gagal untuk release signing."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/key.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=key.jks
          EOF

      - name: Write .env
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL:-https://api.sulbarkerja.id/api/v1}
          APP_ENV=production
          SUPPORT_EMAIL=support@sulbarkerja.id
          PRIVACY_POLICY_URL=https://sulbarkerja.id/legal/privacy
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload artifact (.aab)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload mapping.txt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping
          path: mobile/build/app/outputs/mapping/release/mapping.txt
          retention-days: 30
          if-no-files-found: warn
